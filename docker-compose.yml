services:
  tama-web:
    container_name: tama-web
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_ENDPOINT: http://tama-api:8004

    image: tama-web
    restart: unless-stopped
    ports:
      - 3004:3004
    networks:
      - app_network
    env_file:
      - ./apps/web/.env.prod

  tama-api:
    container_name: tama-api
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    image: tama-api
    restart: unless-stopped
    ports:
      - 8004:8004
    networks:
      - app_network
    env_file:
      - ./apps/api/.env.prod

# Define a network, which allows containers to communicate
# with each other, by using their container name as a hostname
networks:
  app_network:
    external: true
